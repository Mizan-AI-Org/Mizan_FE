<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/" />
  <title>Mizan - AI-Powered Restaurant Operations</title>
  <meta name="description"
    content="AI-powered operating system for restaurant operations. Optimize inventory, staff scheduling, and business analytics with intelligent automation." />
  <meta name="author" content="Mizan Restaurant OS" />

  <!-- Warm up connections used during first paint to shave ~200–400ms on cold starts -->
  <link rel="preconnect" href="https://api.heymizan.ai" crossorigin />
  <link rel="dns-prefetch" href="https://api.heymizan.ai" />
  <link rel="preconnect" href="https://lua-ai-global.github.io" crossorigin />
  <link rel="dns-prefetch" href="https://lua-ai-global.github.io" />

  <!-- Start fetching the initial locale file in parallel with JS (i18n useSuspense needs it) -->
  <link rel="preload" href="/locales/en.json" as="fetch" type="application/json" crossorigin />

  <meta property="og:title" content="Mizan - AI Restaurant Operating System" />
  <meta property="og:description"
    content="Transform your restaurant operations with AI-powered inventory management, staff scheduling, and predictive analytics." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@mizan_restaurant" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <!-- Must NOT block initial paint; load after the app shell -->
  <script async defer src="https://lua-ai-global.github.io/lua-pop/lua-pop.umd.js"></script>
  <!-- Notifications disabled: Service worker registration removed -->
</body>

</html>
